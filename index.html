<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amber &amp; Ash — لوحة التحكم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ==================================================================
   Amber & Ash — Admin Dashboard
   ------------------------------------------------------------------
   نفس هوية تطبيق العميل (زجاجي دافي) لكن بمساحة عمل أهدى وأكتر
   كثافة بيانات، مناسبة لكاشير بيشتغل بسرعة. فيها Dark/Light toggle.
================================================================== */
:root{
  --espresso-950:#170F0B; --espresso-900:#241A12; --espresso-800:#33241A;
  --glass-fill:rgba(255,255,255,0.05); --glass-fill-strong:rgba(255,255,255,0.09);
  --glass-border:rgba(255,255,255,0.10);
  --cream:#F6EEE1; --cream-dim:#CBB9A0; --cream-faint:#8C7B67;
  --caramel:#D6A15C; --caramel-deep:#B87F3B; --cardamom:#8FA377; --rose:#C97064; --sky:#7FA8C9;
  --bg:var(--espresso-950); --panel:var(--espresso-900); --text:var(--cream); --text-dim:var(--cream-dim); --text-faint:var(--cream-faint);
}
html.light{
  --bg:#FBF7F0; --panel:#FFFFFF; --glass-fill:rgba(0,0,0,0.02); --glass-fill-strong:rgba(0,0,0,0.035);
  --glass-border:rgba(0,0,0,0.08); --text:#2B1D16; --text-dim:#6B5A48; --text-faint:#A6957F;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{ margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; transition:background .3s ease, color .3s ease; }
.font-display{ font-family:'Instrument Serif', serif; font-style:italic; }
.font-mono{ font-family:'JetBrains Mono',monospace; font-style:normal; }
::-webkit-scrollbar{ width:6px; height:6px; }
::-webkit-scrollbar-thumb{ background:rgba(128,110,90,0.3); border-radius:10px; }
.no-scrollbar::-webkit-scrollbar{ display:none; }
.no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }

.glass{ background:var(--glass-fill); border:1px solid var(--glass-border); backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%); }
.glass-strong{ background:var(--glass-fill-strong); border:1px solid var(--glass-border); backdrop-filter:blur(22px) saturate(150%); -webkit-backdrop-filter:blur(22px) saturate(150%); }

.btn{ transition:transform .15s ease, filter .2s ease, background .2s ease; }
.btn:active{ transform:scale(.96); }
@keyframes fadeUp{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
.fade-up{ animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both; }
@keyframes pulseDot{ 0%,100%{opacity:1} 50%{opacity:.3} }
.pulse-dot{ animation:pulseDot 1.6s ease-in-out infinite; }

.side-link{ transition:background .2s ease, color .2s ease; }
.side-link.active{ background:var(--caramel); color:var(--espresso-950) !important; }

.tgl{ appearance:none; width:42px; height:24px; border-radius:999px; background:rgba(128,110,90,0.25); position:relative; cursor:pointer; transition:background .25s ease; border:1px solid var(--glass-border); flex-shrink:0; }
.tgl:checked{ background:var(--caramel); border-color:var(--caramel); }
.tgl::before{ content:''; position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:999px; background:#fff; transition:transform .25s cubic-bezier(.32,.72,0,1); box-shadow:0 1px 3px rgba(0,0,0,.35); }
.tgl:checked::before{ transform:translateX(-18px); }

input:focus, select:focus{ outline:2px solid var(--caramel); outline-offset:1px; }
button:focus-visible{ outline:2px solid var(--caramel); outline-offset:2px; }
.status-chip{ font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.03em; }

@media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; transition-duration:.001ms !important; } }
</style>
</head>
<body>

<div class="max-w-[1400px] mx-auto px-3 sm:px-6 py-5 flex gap-5">

  <!-- ============== Sidebar ============== -->
  <aside class="hidden lg:block w-60 shrink-0">
    <div class="glass rounded-3xl p-4 sticky top-5">
      <div class="flex items-center gap-2 px-2 py-2 mb-3">
        <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-lg" style="background:var(--caramel); color:var(--espresso-950);">☕</div>
        <div><p class="font-display text-lg" style="color:var(--text);">Amber &amp; Ash</p><p class="text-[10px] font-mono" style="color:var(--text-faint);">لوحة التحكم</p></div>
      </div>
      <div id="sidebarLinks" class="space-y-1"></div>
      <div class="mt-4 pt-4 flex items-center justify-between" style="border-top:1px solid var(--glass-border);">
        <span class="text-xs font-semibold" style="color:var(--text-dim);">الوضع الليلي</span>
        <button onclick="toggleTheme()" id="themeToggleBtn" class="text-lg">🌙</button>
      </div>
    </div>
  </aside>

  <!-- mobile tab select -->
  <div class="lg:hidden fixed bottom-0 left-0 right-0 z-40 p-2 glass-strong" style="border-radius:0;">
    <select id="mobileTabSelect" onchange="showTab(this.value)" class="w-full rounded-2xl px-3 py-3 text-sm font-semibold border" style="background:var(--panel); border-color:var(--glass-border); color:var(--text);"></select>
  </div>

  <!-- ============== Main ============== -->
  <div class="flex-1 min-w-0 pb-24 lg:pb-4">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
      <div>
        <h1 id="tabTitle" class="font-display text-3xl" style="color:var(--text);"></h1>
        <p id="tabSubtitle" class="text-xs mt-0.5" style="color:var(--text-dim);"></p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleTheme()" class="lg:hidden w-10 h-10 rounded-xl glass flex items-center justify-center text-lg" id="themeToggleBtnMobile">🌙</button>
        <span class="flex items-center gap-1.5 text-[11px] font-mono px-3 py-2 rounded-xl glass" style="color:var(--cardamom);">
          <span class="w-1.5 h-1.5 rounded-full pulse-dot" style="background:var(--cardamom);"></span> LIVE
        </span>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="miniToast" class="fixed bottom-20 lg:bottom-6 left-1/2 z-50 transition-all duration-300 opacity-0 pointer-events-none" style="transform:translate(-50%,20px);">
  <div class="px-4 py-2.5 rounded-2xl text-xs font-semibold glass-strong" id="miniToastText" style="color:var(--text);"></div>
</div>

<!-- new-order sound (short beep synthesized — no external file needed) -->

<script>
/* ==================================================================
   الإعدادات — حط رابط الـ Google Apps Script Web App هنا
================================================================== */
const API_URL = "https://script.google.com/macros/s/AKfycbwPKSU62qALrrFv5IcfAirpWbdvlSToWwAGI_B9RZG70IZy50wWXxT12KodsxXjpuly/exec"; // <-- غيّر ده

/* ---------------- الحالة العامة ---------------- */
let state = { tab:'orders', orders:[], menu:[], lastOrderCount:null };
const fmt = (n) => `${Number(n).toFixed(0)} ج.م`;

/* ---------------- أدوات النداء على الـ API ---------------- */
async function apiGet(action){ const res = await fetch(`${API_URL}?action=${action}`); return res.json(); }
async function apiPost(payload){
  const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) });
  return res.json();
}

function miniToast(msg){
  const el = document.getElementById('miniToast');
  document.getElementById('miniToastText').textContent = msg;
  el.style.opacity='1'; el.style.transform='translate(-50%,0)';
  clearTimeout(window._mt);
  window._mt = setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translate(-50%,20px)'; }, 2400);
}

// صوت تنبيه بسيط لطلب جديد — متولّد بالكود، مش محتاج ملف صوت خارجي
function playNewOrderSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [880, 1180].forEach((freq, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.001, ctx.currentTime + i*0.16);
      g.gain.exponentialRampToValueAtTime(0.09, ctx.currentTime + i*0.16 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.16 + 0.22);
      o.start(ctx.currentTime + i*0.16); o.stop(ctx.currentTime + i*0.16 + 0.24);
    });
  }catch(e){}
}

/* ---------------- الوضع الليلي/النهاري ---------------- */
let theme = localStorage.getItem('amberash_theme') || 'dark';
function applyTheme(){
  document.documentElement.classList.toggle('light', theme === 'light');
  const icon = theme === 'dark' ? '🌙' : '☀️';
  document.getElementById('themeToggleBtn').textContent = icon;
  document.getElementById('themeToggleBtnMobile').textContent = icon;
}
function toggleTheme(){ theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('amberash_theme', theme); applyTheme(); }

/* ---------------- التابات (الصفحات) ---------------- */
const TABS = [
  { id:'orders', label:'الطلبات اللحظية', icon:'🧾', subtitle:'الطلبات الجديدة بتظهر هنا أوتوماتيك مع صوت تنبيه' },
  { id:'stats', label:'إحصائيات اليوم', icon:'📊', subtitle:'أداء المبيعات وطرق الدفع لليوم الحالي' },
  { id:'menu', label:'إدارة المنيو', icon:'🍽️', subtitle:'الأسعار والتوفر بيتحدثوا فورًا في تطبيق العميل' },
];
function renderSidebar(){
  document.getElementById('sidebarLinks').innerHTML = TABS.map(t => `
    <button onclick="showTab('${t.id}')" class="side-link ${state.tab===t.id?'active':''} w-full text-right px-3 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2.5"
      style="${state.tab===t.id?'':'color:var(--text-dim)'}">${t.icon} ${t.label}</button>`).join('');
  document.getElementById('mobileTabSelect').innerHTML = TABS.map(t => `<option value="${t.id}" ${state.tab===t.id?'selected':''}>${t.icon} ${t.label}</option>`).join('');
  const active = TABS.find(t=>t.id===state.tab);
  document.getElementById('tabTitle').textContent = active.label;
  document.getElementById('tabSubtitle').textContent = active.subtitle;
}
function showTab(id){ state.tab = id; renderSidebar(); renderContent(); }

async function renderContent(){
  const container = document.getElementById('content');
  container.innerHTML = `<p class="text-sm py-16 text-center" style="color:var(--text-faint);">بيتحمل…</p>`;
  if(state.tab === 'orders') await renderOrdersTab(container);
  if(state.tab === 'stats') await renderStatsTab(container);
  if(state.tab === 'menu') await renderMenuTab(container);
}

/* ============================================================
   تبويب: الطلبات اللحظية
============================================================= */
const STATUS_COLOR = { 'Pending':'var(--caramel)', 'Completed':'var(--cardamom)', 'Canceled':'var(--rose)' };
const STATUS_LABEL = { 'Pending':'قيد الانتظار', 'Completed':'مكتمل', 'Canceled':'ملغي' };

async function renderOrdersTab(container){
  const res = await apiGet('getOrders');
  if(!res.ok){ container.innerHTML = apiErrorBox(res.error); return; }

  state.orders = res.data;
  const active = state.orders.filter(o => o.Status === 'Pending');
  const history = state.orders.filter(o => o.Status !== 'Pending');

  container.innerHTML = `
    <div class="mb-3 flex items-center gap-2">
      <span class="text-sm font-semibold" style="color:var(--text-dim);">قيد الانتظار</span>
      <span class="text-xs font-mono px-2 py-0.5 rounded-full glass">${active.length}</span>
    </div>
    <div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-3 mb-8">
      ${active.length === 0 ? `<div class="glass rounded-2xl p-8 text-center col-span-full"><p class="text-sm" style="color:var(--text-faint);">مفيش طلبات جديدة دلوقتي ☕</p></div>` :
      active.map(o => orderCard(o)).join('')}
    </div>
    <div class="mb-3 flex items-center gap-2">
      <span class="text-sm font-semibold" style="color:var(--text-dim);">طلبات سابقة</span>
      <span class="text-xs font-mono px-2 py-0.5 rounded-full glass">${history.length}</span>
    </div>
    <div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-3">
      ${history.slice(0,12).map(o => orderCard(o)).join('') || `<p class="text-sm col-span-full" style="color:var(--text-faint);">لسه مفيش طلبات سابقة.</p>`}
    </div>`;
}

function orderCard(o){
  let details = [];
  try{ details = JSON.parse(o.Details); }catch(e){}
  const dateStr = o.Date ? new Date(o.Date).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}) : '';
  return `
    <div class="glass rounded-2xl p-4 fade-up">
      <div class="flex items-start justify-between mb-2">
        <div>
          <p class="font-mono text-xs" style="color:var(--text-faint);">${o.OrderID}</p>
          <p class="text-sm font-bold mt-0.5" style="color:var(--text);">طاولة ${o.TableNumber}</p>
        </div>
        <span class="status-chip px-2 py-1 rounded-lg" style="background:color-mix(in srgb, ${STATUS_COLOR[o.Status]} 18%, transparent); color:${STATUS_COLOR[o.Status]};">${STATUS_LABEL[o.Status] || o.Status}</span>
      </div>
      <div class="text-xs mb-3 space-y-0.5" style="color:var(--text-dim);">
        ${details.map(d => `<p>${d.qty}× ${d.name}</p>`).join('')}
      </div>
      <div class="flex items-center justify-between mb-3">
        <span class="text-[11px] font-mono" style="color:var(--text-faint);">${paymentIcon(o.PaymentMethod)} ${o.PaymentMethod} · ${dateStr}</span>
        <span class="font-mono font-bold text-sm" style="color:var(--caramel);">${fmt(o.Total)}</span>
      </div>
      ${o.Status === 'Pending' ? `
      <div class="flex gap-2">
        <button onclick="setOrderStatus('${o.OrderID}','Completed')" class="btn flex-1 text-xs font-bold py-2 rounded-xl" style="background:var(--cardamom); color:var(--espresso-950);">إتمام</button>
        <button onclick="setOrderStatus('${o.OrderID}','Canceled')" class="btn flex-1 text-xs font-bold py-2 rounded-xl" style="background:rgba(201,112,100,0.15); color:var(--rose);">إلغاء</button>
      </div>` : ''}
    </div>`;
}
function paymentIcon(method){ return method === 'Cash' ? '💵' : method === 'Visa' ? '💳' : method === 'InstaPay' ? '📱' : '💰'; }

async function setOrderStatus(orderId, status){
  const res = await apiPost({ action:'updateOrderStatus', orderId, status });
  if(res.ok){ miniToast(status === 'Completed' ? 'تم إتمام الطلب ✓' : 'تم إلغاء الطلب'); renderContent(); }
  else miniToast('حصل خطأ: ' + res.error);
}

/* ============================================================
   تبويب: إحصائيات اليوم
============================================================= */
async function renderStatsTab(container){
  const res = await apiGet('getOrders');
  if(!res.ok){ container.innerHTML = apiErrorBox(res.error); return; }

  const todayStr = new Date().toDateString();
  const todays = res.data.filter(o => o.Date && new Date(o.Date).toDateString() === todayStr && o.Status !== 'Canceled');
  const totalRevenue = todays.reduce((s,o)=>s+Number(o.Total),0);
  const totalOrders = todays.length;
  const byMethod = { Cash:0, Visa:0, InstaPay:0 };
  todays.forEach(o => { byMethod[o.PaymentMethod] = (byMethod[o.PaymentMethod]||0) + Number(o.Total); });
  const maxMethod = Math.max(...Object.values(byMethod), 1);

  container.innerHTML = `
    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4 mb-6">
      ${statCard('إجمالي الإيراد اليوم', fmt(totalRevenue))}
      ${statCard('عدد الطلبات', totalOrders)}
      ${statCard('متوسط الطلب', fmt(totalOrders ? totalRevenue/totalOrders : 0))}
    </div>
    <div class="glass rounded-3xl p-5">
      <p class="text-sm font-semibold mb-4" style="color:var(--text-dim);">الإيراد حسب طريقة الدفع</p>
      <div class="space-y-4">
        ${Object.entries(byMethod).map(([method,val]) => `
          <div>
            <div class="flex justify-between text-xs mb-1.5">
              <span style="color:var(--text-dim);">${paymentIcon(method)} ${method}</span>
              <span class="font-mono font-semibold" style="color:var(--text);">${fmt(val)}</span>
            </div>
            <div class="w-full h-2.5 rounded-full" style="background:rgba(128,110,90,0.15);">
              <div class="h-2.5 rounded-full" style="width:${(val/maxMethod)*100}%; background:var(--caramel);"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}
function statCard(label, value){
  return `<div class="glass rounded-2xl p-4 sm:p-5 fade-up">
    <p class="text-[11px] font-mono uppercase tracking-wide" style="color:var(--text-faint);">${label}</p>
    <p class="font-display text-3xl mt-1" style="color:var(--text);">${value}</p>
  </div>`;
}
function apiErrorBox(msg){
  return `<div class="glass rounded-2xl p-8 text-center">
    <p class="text-sm font-semibold mb-1" style="color:var(--rose);">تعذر تحميل البيانات</p>
    <p class="text-xs" style="color:var(--text-faint);">${msg || 'تأكد من رابط الـ API'}</p>
  </div>`;
}

/* ============================================================
   تبويب: إدارة المنيو
============================================================= */
async function renderMenuTab(container){
  const res = await apiGet('getMenu');
  if(!res.ok){ container.innerHTML = apiErrorBox(res.error); return; }
  state.menu = res.data;

  container.innerHTML = `
    <div class="glass rounded-3xl overflow-hidden">
      <div class="overflow-x-auto"><table class="w-full text-sm min-w-[560px]">
        <thead><tr class="text-right text-[11px] font-mono uppercase tracking-wide" style="color:var(--text-faint); background:rgba(128,110,90,0.06);">
          <th class="px-4 py-3 font-medium">الصنف</th><th class="px-4 py-3 font-medium">التصنيف</th>
          <th class="px-4 py-3 font-medium">السعر</th><th class="px-4 py-3 font-medium">الحالة</th><th class="px-4 py-3 font-medium">متاح</th>
        </tr></thead>
        <tbody>
          ${state.menu.map(item => {
            const available = item.Available === true || item.Available === 'true' || item.Available === 'TRUE';
            return `<tr style="border-top:1px solid var(--glass-border);">
              <td class="px-4 py-3 font-semibold">${item.Name}</td>
              <td class="px-4 py-3 text-xs" style="color:var(--text-dim);">${item.Category}</td>
              <td class="px-4 py-3">
                <div class="flex items-center gap-1">
                  <span class="font-mono text-xs" style="color:var(--text-faint);">ج.م</span>
                  <input type="number" value="${Number(item.Price)}" min="0" onchange="updatePrice('${item.ID}', this.value)"
                    class="w-20 rounded-lg px-2 py-1.5 text-sm font-mono" style="background:rgba(128,110,90,0.08); border:1px solid var(--glass-border); color:var(--text);">
                </div>
              </td>
              <td class="px-4 py-3">
                <span class="status-chip px-2 py-1 rounded-lg" style="background:${available?'rgba(143,163,119,.15)':'rgba(201,112,100,.15)'}; color:${available?'var(--cardamom)':'var(--rose)'};">${available?'متاح':'غير متاح'}</span>
              </td>
              <td class="px-4 py-3"><input type="checkbox" class="tgl" ${available?'checked':''} onchange="toggleAvailability('${item.ID}', this.checked)"></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>
    <p class="text-xs mt-3" style="color:var(--text-faint);">أي تعديل هنا بيتحدث فورًا في الجوجل شيت، وبيظهر لحظيًا لأي عميل بيفتح المنيو.</p>`;
}
async function updatePrice(id, price){
  const res = await apiPost({ action:'updatePrice', id, price:Number(price) });
  if(res.ok) miniToast('تم تحديث السعر'); else miniToast('حصل خطأ: ' + res.error);
}
async function toggleAvailability(id, available){
  const res = await apiPost({ action:'toggleAvailability', id, available });
  if(res.ok) miniToast(available ? 'الصنف بقى متاح' : 'الصنف بقى غير متاح'); else miniToast('حصل خطأ: ' + res.error);
}

/* ============================================================
   التحديث التلقائي في الخلفية (Silent Polling)
   بيفحص كل 6 ثواني لو في طلب جديد، ولو لقى يشغّل صوت + يحدّث الشاشة
============================================================= */
async function silentPoll(){
  try{
    const res = await apiGet('getOrders');
    if(!res.ok) return;
    const count = res.data.length;
    if(state.lastOrderCount === null){ state.lastOrderCount = count; return; }
    if(count > state.lastOrderCount){
      playNewOrderSound();
      miniToast('🔔 طلب جديد وصل!');
      if(state.tab === 'orders') renderContent();
    }
    state.lastOrderCount = count;
  }catch(e){}
}
setInterval(silentPoll, 6000);

/* ---------------- تشغيل التطبيق ---------------- */
applyTheme();
renderSidebar();
renderContent();
silentPoll();
</script>
</body>
</html>
